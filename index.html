<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & Signup Form</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <!-- Signup Form -->
      <div class="form-box signup">
        <form id="signupForm">
          <h2>Create Account</h2>

          <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input
              type="text"
              id="signupName"
              name="fullname"
              placeholder="Full Name"
              required
            />
          </div>

          <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input
              type="email"
              id="signupEmail"
              name="email"
              placeholder="Email Address"
              required
            />
          </div>

          <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              id="signupPassword"
              name="password"
              placeholder="Password"
              required
            />
          </div>

          <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Confirm Password"
              required
            />
          </div>

          <small id="signupError" class="error"></small>

          <button type="submit" class="btn">Sign Up</button>

          <p class="social-text">Or sign up with</p>

          <div class="social-icons">
            <a href="#"><i class="fa-brands fa-google"></i></a>
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
        </form>
      </div>

      <!-- Login Form -->
      <div class="form-box login">
        <form id="loginForm">
          <h2>Welcome Back</h2>

          <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input
              type="email"
              id="loginEmail"
              name="email"
              placeholder="Email Address"
              required
            />
          </div>

          <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              id="loginPassword"
              name="password"
              placeholder="Password"
              required
            />
          </div>

          <small id="loginError" class="error"></small>

          <div class="remember-forgot">
            <label class="remember">
              <input type="checkbox" name="remember" />
              <span>Remember Me</span>
            </label>

            <a href="#" id="forgotPassword"> Forgot Password? </a>
          </div>

          <button type="submit" class="btn">Login</button>

          <p class="social-text">Or login with</p>

          <div class="social-icons">
            <a href="#"><i class="fa-brands fa-google"></i></a>
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
        </form>
      </div>

      <!-- Toggle Section -->
      <div class="toggle-box">
        <div class="toggle-panel toggle-left">
          <h1>Hello, Friend!</h1>

          <p>Enter your personal details and start your journey with us.</p>

          <button type="button" class="toggle-btn" id="loginToggle">
            Sign In
          </button>
        </div>

        <div class="toggle-panel toggle-right">
          <h1>Welcome Back!</h1>

          <p>
            To keep connected with us, please login with your personal info.
          </p>

          <button type="button" class="toggle-btn" id="signupToggle">
            Sign Up
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
